<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Youth Justice System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f5;
            color: #333;
        }
        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        h1 {
            margin-bottom: 10px;
        }
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
            transition: transform 0.3s ease;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 12px rgba(0, 0, 0, 0.15);
        }
        .card h2 {
            color: #667eea;
            margin-bottom: 15px;
        }
        .card p {
            color: #666;
            margin-bottom: 15px;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s ease;
        }
        button:hover {
            background: #764ba2;
        }
    </style>
</head>
<body>
    <header>
        <h1>Dashboard</h1>
        <p>Youth Justice System Management</p>
    </header>
    <div class="container">
        <div class="dashboard-grid">
            <div class="card">
                <h2>📋 Cases</h2>
                <p>Manage court cases and records</p>
                <button>View Cases</button>
            </div>
            <div class="card">
                <h2>👥 Youth Records</h2>
                <p>Track youth participants</p>
                <button>View Youth</button>
            </div>
            <div class="card">
                <h2>⚙️ Administration</h2>
                <p>Manage system settings</p>
                <button>Access Admin</button>
            </div>
        </div>
    </div>
</body>
</html>
